<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instalando Quick Test, Qyvo Live</title>
<meta http-equiv="refresh" content="0; url=https://chromewebstore.google.com/detail/mngcnhbahijlngomjdhdenlibeiifgmp">
<link rel="icon" href="/quick-test/assets/logo.png">
<style>
  body {
    margin: 0;
    background: #0A0A0E;
    color: #F5F2E8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .logo {
    width: 48px;
    height: 48px;
    background: #FF1F8E;
    clip-path: polygon(0 0, 100% 50%, 0 100%);
    margin: 0 auto 24px;
    filter: drop-shadow(0 0 12px rgba(255, 31, 142, 0.4));
  }
  h1 {
    font-family: "Anton", Impact, sans-serif;
    font-size: 36px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    margin: 0 0 12px;
  }
  p { color: #9B9AA8; font-size: 15px; max-width: 360px; margin: 0 auto 24px; line-height: 1.55; }
  a {
    display: inline-block;
    background: #FF1F8E;
    color: white;
    padding: 14px 26px;
    border-radius: 100px;
    text-decoration: none;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div>
    <div class="logo"></div>
    <h1>Abrindo Chrome Web Store…</h1>
    <p>Se não abrir automaticamente em 3 segundos, clica no botão abaixo.</p>
    <a href="https://chromewebstore.google.com/detail/mngcnhbahijlngomjdhdenlibeiifgmp">Abrir Quick Test na Chrome Web Store →</a>
  </div>
</body>
</html>
